<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kits - KitBot</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/app.js"></script>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="/" class="nav-brand">🎮 KitBot</a>
      <div class="nav-links">
        <a href="/" class="nav-link">Dashboard</a>
        <a href="/kits" class="nav-link">Kits</a>
        <a href="/orders" class="nav-link">Orders</a>
        <a href="#" class="nav-link" onclick="api.logout(); return false;">Logout</a>
      </div>
    </nav>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Kits</span>
        <button id="addKitBtn" class="btn btn-primary btn-sm" onclick="showModal()">+ Add Kit</button>
      </div>
      <div id="error" class="error hidden"></div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Home Location</th>
            <th>Chest Coordinates</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="kitsList">
          <tr><td colspan="5" class="text-muted text-center">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="modal" class="modal-backdrop hidden">
    <div class="modal">
      <h2 id="modalTitle" class="modal-title">Add Kit</h2>
      <form id="kitForm">
        <input type="hidden" id="kitId">
        <div class="form-group">
          <label class="label">Kit Name</label>
          <input type="text" id="kitName" class="input" placeholder="e.g., Iron Starter Kit" required>
        </div>
        <div class="form-group">
          <label class="label">Home Location Name</label>
          <input type="text" id="homeName" class="input" placeholder="e.g., iron_kit" required>
        </div>
        <div class="form-group">
          <label class="label">Chest X</label>
          <input type="number" id="chestX" class="input" step="0.5" required>
        </div>
        <div class="form-group">
          <label class="label">Chest Y</label>
          <input type="number" id="chestY" class="input" step="0.5" required>
        </div>
        <div class="form-group">
          <label class="label">Chest Z</label>
          <input type="number" id="chestZ" class="input" step="0.5" required>
        </div>
        <div class="flex gap-2">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary" onclick="hideModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div id="deleteModal" class="modal-backdrop hidden">
    <div class="modal">
      <h2 class="modal-title">Delete Kit</h2>
      <p>Are you sure you want to delete this kit? This action cannot be undone.</p>
      <input type="hidden" id="deleteKitId">
      <div class="flex gap-2 mt-4">
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
        <button class="btn btn-secondary" onclick="hideDeleteModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let isAdmin = false;

    async function checkAdmin() {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      isAdmin = user.role === 'admin';
      if (!isAdmin) {
        document.getElementById('addKitBtn').classList.add('hidden');
      }
    }

    async function loadKits() {
      try {
        const kits = await api.request('/kits');
        const tbody = document.getElementById('kitsList');
        
        if (kits.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="text-muted text-center">No kits configured</td></tr>';
          return;
        }

        tbody.innerHTML = kits.map(kit => `
          <tr>
            <td><strong>${escapeHtml(kit.name)}</strong></td>
            <td>${escapeHtml(kit.homeName)}</td>
            <td>(${kit.chestX}, ${kit.chestY}, ${kit.chestZ})</td>
            <td class="text-sm">${utils.formatDate(kit.createdAt)}</td>
            <td>
              ${isAdmin ? `
                <div class="flex gap-2">
                  <button class="btn btn-secondary btn-sm" onclick="editKit('${kit.id}', '${escapeHtml(kit.name)}', '${escapeHtml(kit.homeName)}', ${kit.chestX}, ${kit.chestY}, ${kit.chestZ})">Edit</button>
                  <button class="btn btn-danger btn-sm" onclick="showDeleteModal('${kit.id}')">Delete</button>
                </div>
              ` : '-'}
            </td>
          </tr>
        `).join('');
      } catch (err) {
        showError('error', err.message);
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function showModal() {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modalTitle').textContent = 'Add Kit';
      document.getElementById('kitForm').reset();
      document.getElementById('kitId').value = '';
    }

    function hideModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function editKit(id, name, homeName, x, y, z) {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modalTitle').textContent = 'Edit Kit';
      document.getElementById('kitId').value = id;
      document.getElementById('kitName').value = name;
      document.getElementById('homeName').value = homeName;
      document.getElementById('chestX').value = x;
      document.getElementById('chestY').value = y;
      document.getElementById('chestZ').value = z;
    }

    function showDeleteModal(id) {
      document.getElementById('deleteKitId').value = id;
      document.getElementById('deleteModal').classList.remove('hidden');
    }

    function hideDeleteModal() {
      document.getElementById('deleteModal').classList.add('hidden');
    }

    async function confirmDelete() {
      const id = document.getElementById('deleteKitId').value;
      try {
        await api.request(`/kits/${id}`, { method: 'DELETE' });
        hideDeleteModal();
        loadKits();
      } catch (err) {
        alert('Failed to delete kit: ' + err.message);
      }
    }

    document.getElementById('kitForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('kitId').value;
      const data = {
        name: document.getElementById('kitName').value,
        homeName: document.getElementById('homeName').value,
        chestX: parseFloat(document.getElementById('chestX').value),
        chestY: parseFloat(document.getElementById('chestY').value),
        chestZ: parseFloat(document.getElementById('chestZ').value),
      };

      try {
        if (id) {
          await api.request(`/kits/${id}`, {
            method: 'PUT',
            body: JSON.stringify(data)
          });
        } else {
          await api.request('/kits', {
            method: 'POST',
            body: JSON.stringify(data)
          });
        }
        hideModal();
        loadKits();
      } catch (err) {
        alert('Failed to save kit: ' + err.message);
      }
    });

    checkAdmin();
    loadKits();
  </script>
</body>
</html>
