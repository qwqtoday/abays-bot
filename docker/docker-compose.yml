services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: abays-bot
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - DATABASE_PATH=/app/data/bot.db
      - NODE_ENV=production
    volumes:
      - bot-data:/app/data
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  bot-data: